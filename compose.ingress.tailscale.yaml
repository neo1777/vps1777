# compose.ingress.tailscale.yaml — Tailscale Funnel sidecar
#
# Pattern: container `tailscale/tailscale` con `network_mode: service:gateway`
# → condivide il network namespace del gateway, quindi:
#   - tailscale funnel inoltra a http://127.0.0.1:8080 (= gateway, stesso ns)
#   - tailscale esce su internet attraverso la rete `ingress` del gateway
#     (per questo il gateway DEVE restare su `ingress`, non solo backend)
#
# NB: con network_mode: service:X NON si può usare `hostname:` né `networks:`
#     sul container (eredita tutto dal gateway). TS_HOSTNAME (env) imposta
#     comunque il nome del nodo nel tailnet.
#
# Auth: TS_AUTHKEY (da .env). Vuoto → il container parte ma non si logga;
#       autenticalo dopo con:
#         docker exec -it vps1777-tailscale tailscale up --authkey=tskey-auth-...
#
# Profilo: ingress.tailscale

services:

  tailscale:
    profiles: [ingress.tailscale]
    image: tailscale/tailscale:v1.78.1
    container_name: vps1777-tailscale
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      TS_HOSTNAME: ${TS_HOSTNAME:-vps1777}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"          # kernel WireGuard
      TS_AUTHKEY: ${TS_AUTHKEY:-}     # vuoto = login manuale dopo
      TS_AUTH_ONCE: "true"
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./ingress/tailscale-serve.json:/config/serve.json:ro
    network_mode: "service:gateway"  # condivide il network del gateway
    depends_on:
      gateway:
        condition: service_healthy

# Il gateway resta sulle reti del compose base (backend + ingress).
# `ingress` (bridge non-internal) dà a Tailscale l'egress verso i
# coordination server. NON ridefiniamo qui le sue reti.

volumes:
  tailscale-state:

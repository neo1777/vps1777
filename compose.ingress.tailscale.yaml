# compose.ingress.tailscale.yaml — Tailscale Funnel (Tailscale gira SULL'HOST)
#
# Tailscale NON gira più in un container sidecar. Gira come servizio systemd
# sull'HOST, installato e configurato dall'installer (engine.py) o da deploy.sh:
#   tailscale up --auth-key=... --hostname=vps1777
#   tailscale serve  --bg --https=443 http://127.0.0.1:8080
#   tailscale funnel --bg 443
#
# Perché host e non sidecar (lezione appresa sul campo):
#   - il container ufficiale tailscale ha avuto un bug di containerboot
#     (panic in storeHTTPSEndpoint con TS_SERVE_CONFIG fuori da Kubernetes →
#     crash-loop, vedi v1.78.x);
#   - `network_mode: service:gateway` crea un netns fragile: ricreare il
#     gateway orfanizza il sidecar (niente DNS/proxy).
#   Sull'host `tailscaled` è robusto, sopravvive ai reboot nativamente, e la
#   config serve/funnel persiste nello stato di tailscaled.
#
# Qui pubblichiamo solo il gateway su una porta dell'host che `tailscaled`
# (sull'host) raggiunge per il serve/funnel. GATEWAY_BIND controlla l'esposizione:
#   GATEWAY_BIND=127.0.0.1 → solo loopback (produzione: lo vede solo il Funnel)
#   GATEWAY_BIND=0.0.0.0   → fallback raggiungibile via http://IP:8080 (se il Funnel non parte)
#
# Profilo: ingress.tailscale

services:
  gateway:
    ports:
      - "${GATEWAY_BIND:-127.0.0.1}:8080:8080"

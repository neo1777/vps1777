# compose.ingress.tailscale.yaml — Tailscale Funnel sidecar
#
# Pattern: container `tailscale/tailscale` con `network_mode: service:gateway`
# (condivide il network namespace col gateway → 127.0.0.1:8080 raggiungibile).
# Funnel attivo via TS_SERVE_CONFIG (JSON) montato come secret.
#
# Auth modes supportati:
#   1. OAuth client + tag (TS_AUTH_OAUTH_CLIENT_ID + TS_AUTH_OAUTH_CLIENT_SECRET_FILE)
#   2. Auth-key (TS_AUTHKEY_FILE pointing to secrets/ts_authkey.txt)
#
# Setup vedi docs/INGRESS.md (TBD)
#
# Profilo: ingress.tailscale

services:

  tailscale:
    profiles: [ingress.tailscale]
    image: tailscale/tailscale:v1.78.1
    container_name: vps1777-tailscale
    hostname: ${TS_HOSTNAME:-vps1777}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    environment:
      TS_HOSTNAME: ${TS_HOSTNAME:-vps1777}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"        # kernel WireGuard (più veloce)
      TS_ENABLE_HEALTH_CHECK: "true"
      # ─── auth (uno dei due) ─────────────────────────────────────────────
      # OAuth client mode (tag-owned, no scadenza 90gg)
      TS_AUTH_KEY: ${TS_AUTHKEY:-}    # fallback se hai impostato auth-key inline
      TS_AUTH_ONCE: "true"
      # ─── funnel config ──────────────────────────────────────────────────
      # JSON che dice: serve https://<host>.ts.net → http://127.0.0.1:8080
      TS_SERVE_CONFIG: /config/serve.json
      TS_EXTRA_ARGS: --advertise-tags=tag:vps1777
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./ingress/tailscale-serve.json:/config/serve.json:ro
    network_mode: "service:gateway"  # condivide il network del gateway
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3

  # Rimuoviamo l'expose del gateway su rete `ingress` (entra invece via TS)
  gateway:
    networks:
      - backend
      # `ingress` non serve in mode Tailscale
    # Non serve `ports:` — Funnel arriva via :443 attraverso il sidecar

networks:
  ingress: {}  # placeholder, non collegato in questo profilo

volumes:
  tailscale-state:

# compose.ops.backup.yaml — backup container con cron
#
# Container Alpine con cron che lancia ogni notte alle 03:00 UTC:
#   /vps1777/tools/backup.sh
#
# Rotation: 7 daily + 4 weekly (gestita dallo stesso backup.sh).
# Output in `backups/` montato dal host.
#
# Requisito host: chiave age + recipient configurati (vedi tools/age-recipients.txt).
#
# Profilo: ops.backup

services:

  backup:
    profiles: [ops.backup]
    image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
    container_name: vps1777-backup
    restart: unless-stopped
    command: ["/vps1777/tools/backup-container-setup.sh"]
    environment:
      TZ: ${TZ:-UTC}
      BACKUP_DIR: /backups
      BACKUP_VOLUMES_DIR: /volumes   # backup.sh tara da qui → niente docker.sock
    volumes:
      # NIENTE docker.sock (finding 2.8/H13): montare il socket dà al container
      # il controllo root-equivalente dell'host. I volumi dati sono invece
      # montati DIRETTAMENTE in sola lettura e backup.sh li tara da /volumes.
      - ${PWD}:/vps1777:rw                       # repo (tools/backup.sh + recipient age)
      - ./backups:/backups:rw
      - gateway-data:/volumes/gateway-data:ro
      - archive-data:/volumes/archive-data:ro
      - nlm-auth:/volumes/nlm-auth:ro
      # Col profilo ingress.caddy esistono anche questi — decommentali per includerli:
      #- caddy-data:/volumes/caddy-data:ro
      #- caddy-config:/volumes/caddy-config:ro
      # NIENTE mount della chiave privata age: il backup CIFRA con la sola chiave
      # pubblica (recipient in tools/age-recipients.txt). La privata vive sul PC
      # dell'owner e serve solo al restore — non deve stare sulla VPS.
    healthcheck:
      test: ["CMD", "pgrep", "-f", "crond"]
      interval: 60s
      timeout: 5s
      retries: 3
    # NB: backup-container-setup.sh installa age (NON docker-cli: i volumi sono
    # montati direttamente) + crea la cron entry e poi exec crond in foreground.

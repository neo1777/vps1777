  - id: H39
    severity: low
    title: "Tetti su upload e decompressione (nlm e archivio)"
    status: closed
    since: v0.32.0
    why: >
      Un limite su un input COMPRESSO non è un limite: dice quanto si trasporta, non
      quanto si espande. Il tetto va messo sui byte SCRITTI, contati mentre si scrivono.
    evidence:
      - file: services/nb1777-mcp/app/nlm_profile.py
        contains: ["MAX_MEMBER_BYTES", "MAX_TOTAL_BYTES"]
      - file: services/gateway/app/archive_indexer.py
        contains: ["def _read_capped", "MAX_UPLOAD_BYTES"]
      - file: services/gateway/app/admin.py
        contains: ["archive_indexer.MAX_UPLOAD_BYTES"]
    note: >
      Lato nlm (v0.30.2) + lato archivio (byte contati mentre si leggono su
      conversations.json, PDF, membri zip) + cap sull'upload di /admin/archive
      PRIMA che i tetti di indicizzazione entrino in gioco.

  - id: H40
    severity: low
    title: "OCR via NotebookLM: esito del cleanup propagato + sweep dei notebook _ingest_"
    status: open
    missing: >
      Se la cancellazione del notebook temporaneo fallisce, si prosegue in silenzio:
      nessun retry, nessun `cleanup_ok` nel risultato, nessuno sweep periodico dei
      notebook `_ingest_*` rimasti. I documenti OCR-ati restano su Google.

  - id: H41
    severity: low
    title: "Contenuti personali fuori da argv/errori di nlm + minori di logging"
    status: closed
    since: v0.32.0
    evidence:
      - file: services/nb1777-mcp/app/core.py
        contains: ["def _safe_cmd", "tempfile.mkstemp"]
      - file: services/archive-mcp/app/fts.py
        not_contains: ['log.warning("query FTS5']
    note: >
      Testo > 256 char passato via file temporaneo 0600 (verificato che nlm 0.8.3 non
      ha stdin); command line troncata negli errori; contract test esteso per bloccare

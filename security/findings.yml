  - id: H42
    severity: low
    title: "archive-data montato :ro in archive-mcp"
    status: closed
    since: v0.32.0
    why: >
      La sola-lettura era solo APPLICATIVA (SQLite aperto in mode=ro): una promessa
      del codice, non un confine. Col :rw il servizio poteva comunque scrivere.
    evidence:
      - file: compose.yaml
        contains: ["archive-data:/var/lib/archive:ro"]
    note: >
      Verificato sui DB REALI di produzione che il journal_mode è `delete`, non WAL:
      senza WAL non servono i file -wal/-shm, che con un mount :ro fallirebbero. È
      la trappola classica di questo cambio, ed è stata misurata, non assunta.

  - id: H43
    severity: low
    title: "Hardening residuo di unit e container: sandbox update.service, unit templata, rootfs ro"
    status: partial
    since: v0.32.0
    evidence:
      - file: systemd/vps1777-secrets-check.service
        contains: ["User=@OPERATOR_USER@", "NoNewPrivileges=true"]
      - file: systemd/vps1777-update.service
        contains: ["ProtectKernelTunables=true"]
      - file: tools/vps1777.py
        contains: ["def render_unit"]
    missing: >
      Fatti: sandbox delle unit (calibrata su update.service — ProtectSystem/
      NoNewPrivileges romperebbero l'update, documentato) e templatizzazione
      @OPERATOR_USER@/@REPO@ (chiude il bug del monitoraggio che si spegneva con un
      operatore diverso). RESTA: read_only:true sul rootfs dei container (compose);
      e i 3 installer devono RENDERE i placeholder al deploy iniziale (a carico del
      lotto host/deploy — senza, i fresh install si rompono).

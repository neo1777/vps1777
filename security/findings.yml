# security/findings.yml — il registro dei rilievi della review difensiva.
#
# PERCHÉ ESISTE. A luglio 2026 SECURITY.md ha dichiarato «il dossier è applicato
# per intero». Era falso: 8 chiusi su 43. Nessuno se n'era accorto perché quella
# frase non puntava a NULLA — nessun file, nessuna riga, nessun test. Un claim
# senza coordinata è infalsificabile, e quindi non può marcire rumorosamente:
# marcisce in silenzio.
#
# Questo file è la cura. Ogni rilievo porta la sua EVIDENZA, e
# `security/check_findings.py` (girato in CI) verifica che l'evidenza di ogni
# voce dichiarata `closed` ESISTA ANCORA. Da qui in poi, «dichiarato fatto ma
# assente» non è un errore di distrazione: è una build rossa.
#
# COME SI USA
#   status:  closed | partial | open
#   evidence: prove che lo stato è vero. Il checker le verifica per `closed`
#             (e per la parte fatta di `partial`, se dichiarata).
#     - file: percorso dal root del repo
#       contains:     [stringhe che DEVONO esserci]      (opzionale)
#       not_contains: [stringhe che NON devono esserci]  (opzionale)
#   missing: cosa manca (obbligatorio per partial/open) — in italiano, asciutto.
#
# REGOLA: non si sposta una voce a `closed` senza evidenza che il checker sappia
# verificare. Se non sai scrivere l'evidenza, non è chiusa.
#
# Base della review: commit v0.16.0. Aggiornato: 2026-07-14 (v0.30.2).

meta:
  dossier: "review difensiva vps1777, luglio 2026 — 5 fasi, 6 aree, 43 interventi deduplicati"
  base_commit: "v0.16.0"
  updated: "2026-07-14"

findings:

  # ═══════════════════════════ FASCIA CRITICA ═══════════════════════════

  - id: H1
    severity: critical
    title: "Owner-gating fail-closed su bot e Mini App"
    status: closed
    since: v0.22.0
    why: >
      Con owner_id assente o con un typo, la condizione `if owner_id and ...`
      corto-circuitava: la Mini App e il bot si aprivano a CHIUNQUE. Il pannello
      completo — URL MCP col segreto, archivio, audit, tasto update.
    evidence:
      - file: services/gateway/app/miniapp_core.py
        contains: ["if not owner_id:"]
      - file: services/nb1777-bot/app/bot.py
        contains: ["if not s.telegram_owner_id or user_id != s.telegram_owner_id:"]
      - file: services/gateway/app/miniapp.py
        contains: ["owner_not_configured"]

  - id: H2
    severity: critical
    title: "Verifica cosign installata e obbligatoria di default sul canale update"
    status: closed
    since: v0.23.0
    why: >
      Il self-update fa `sudo install` ed esegue codice dal bundle come operator
      (che ha NOPASSWD). La verifica della firma era opt-in e SALTATA IN SILENZIO
      su un'installazione standard.
    evidence:
      - file: tools/vps1777.py
        contains: ["VPS1777_REQUIRE_COSIGN", "_ensure_cosign", "verify-blob"]
    note: >
      Attenzione: la firma prova DA QUALE WORKFLOW viene un artefatto, non che
      qualcuno abbia AUTORIZZATO quel rilascio. Vedi H24 (tag non protetti).

  # ═══════════════════════════ FASCIA ALTA ═══════════════════════════

  - id: H3
    severity: high
    title: "Redazione del gateway_secret nei log di accesso"
    status: closed
    since: v0.24.0
    why: >
      Il segreto vive nel PATH del proxy MCP: si depositava in chiaro nella
      request-line di OGNI access-log. Esposizione certa, non condizionale.
      E SECRETS.md dichiarava una sanitizzazione che non esisteva.
    evidence:
      - file: services/gateway/app/logredact.py
        contains: ["class RedactSecrets", "def install"]
      - file: services/gateway/app/__main__.py
        contains: ["_install_redact"]

  - id: H4
    severity: high
    title: "forwarded_allow_ips per profilo + contatore di fallimenti globale"
    status: partial
    since: v0.28.0
    why: >
      Con "*" uvicorn si fidava dell'X-Forwarded-For da qualunque peer: il client
      sceglieva il proprio IP → rate-limit e lockout evadibili, audit avvelenabile.
    evidence:
      - file: services/gateway/app/settings.py
        contains: ["gateway_forwarded_allow_ips"]
      - file: services/gateway/app/__main__.py
        contains: ["forwarded_allow_ips=s.gateway_forwarded_allow_ips"]
        not_contains: ['forwarded_allow_ips="*"']
    missing: >
      Il contatore di fallimenti GLOBALE. SCARTATO PER SCELTA: chiuso lo spoofing,
      il per-IP torna a mordere sull'IP reale; un tetto globale sugli endpoint auth
      introdurrebbe un auto-lockout dell'owner per beneficio marginale su un
      sistema mono-utente. Resta `partial` per onestà, non per dimenticanza.

  - id: H5
    severity: high
    title: "Chiave age fuori dall'host; sulla VPS solo il recipient; push off-site"
    status: partial
    since: v0.26.0
    why: >
      Backup e chiave di decifratura sullo stesso disco: la cifratura non protegge
      né dalla compromissione né dalla perdita dell'host.
    evidence:
      - file: tools/backup.sh
        contains: ["Genera la coppia sul TUO PC"]
        not_contains: ["age-keygen -o \"$KEY\""]
      - file: compose.ops.backup.yaml
        not_contains: ["keys.txt:/root/.config/age/keys.txt"]
    missing: >
      Il push off-site automatico. LASCIATO ALL'OWNER PER SCELTA: la cartella
      backups/ la porta dove vuole (NAS, cloud); vps1777 non trasferisce nulla
      in automatico.

  - id: H6
    severity: high
    title: "Togliere al gateway il mount rw dei cookie Google (nlm-auth)"
    status: closed
    since: v0.30.0
    why: >
      Il gateway — l'UNICO servizio esposto su Internet — montava in scrittura i
      cookie di sessione Google. Compromettere il gateway voleva dire leggerli E
      riscriverli.
    evidence:
      - file: services/nb1777-mcp/app/nlm_profile.py
        contains: ["def install_profile", "def profile_status"]
      - file: services/gateway/app/nlm_client.py
        contains: ["internal/nlm/status", "internal/nlm/profile"]
      - file: services/gateway/app/proxy.py
        contains: ['sub_path.startswith("internal/")']
      - file: compose.yaml
        not_contains: ["nlm-auth:/var/lib/nlm:ro"]
    note: >
      Il proxy MCP è un catch-all: senza il blocco di `internal/` quegli endpoint
      sarebbero stati raggiungibili da Internet — il fix avrebbe APERTO la porta
      che chiudeva. Vedi anche H14: i cookie finiscono ancora in chiaro nello
      snapshot pre-update.

  - id: H7
    severity: high
    title: "Segreti mai negli argv dei comandi remoti di provisioning"
    status: closed
    since: v0.29.0
    why: >
      tailscale authkey, bot token e password admin finivano nell'argv di comandi
      remoti — visibili con `ps` a ogni utente locale della VPS.
    evidence:
      - file: deploy.sh
        contains: ["bash -s", "--authkey=file:", "sys.stdin.buffer.read()"]
        not_contains: ["tailscale up --authkey=$TS_KEY"]
    note: >
      NON verificato con un `deploy.sh --apply` completo contro la produzione
      (riconfigura l'intero stack): verificato per lettura + test delle tecniche
      in isolamento sulla VPS.

  - id: H8
    severity: high
    title: "OAuth: pagina di consenso, limiti al DCR, verifica dell'audience nel proxy"
    status: closed
    since: v0.33.0
    evidence:
      - file: services/gateway/app/proxy.py
        contains: ["subject_not_allowed"]
      - file: services/gateway/app/oauth.py
        contains: ["_REGISTER_LIMIT", "_TOKEN_LIMIT", "def _consent_page", "error=access_denied"]
      - file: services/gateway/app/routes.py
        contains: ['Route("/authorize", oauth.authorize, methods=["GET", "POST"]']
    note: >
      Consent page vera (Neo ha deciso: SÌ): /authorize da loggato mostra
      "autorizzi <client>?" [Autorizza]/[Rifiuta], POST con CSRF, valori client
      html-escaped (XSS), Rifiuta → error=access_denied. Audience + limiti DCR già
      c'erano. Chiude anche uno scostamento: ARCHITECTURE.md la disegnava già.

  - id: H9
    severity: high
    title: "deploy.sh --apply: validare e non interpolare i dati scritti dal gateway"
    status: closed
    since: v0.33.0
    evidence:
      - file: deploy.sh
        contains: ["bash -s", "Config non valida in pending.json", "grep -qE '^tskey-"]
    note: >
      Interpolazione chiusa (via stdin, v0.29.0) + VALIDAZIONE della forma di ogni
      valore prima di scriverlo (tskey-…, <id>:<token>, owner numerico, URL https).
      Verificato che rifiuta le injection ($(rm), ; cat /etc/shadow, http://). Vuoto
      resta lecito (campo non compilato).

  # ═══════════════════════════ FASCIA MEDIA ═══════════════════════════

  - id: H10
    severity: medium
    title: "Degradi di esposizione espliciti, rumorosi e temporanei"
    status: closed
    since: v0.33.0
    evidence:
      - file: services/gateway/app/admin.py
        contains: ["Sessione NON cifrata", '"insecure": not _https']
    note: >
      Il fallback http resta (per non restare chiusi fuori nel setup, scelta di Neo) ma
      è RUMOROSO: banner "sessione NON cifrata" su ogni pagina admin quando il gateway
      non è dietro HTTPS + flag `insecure` nell'audit del login.

  - id: H11
    severity: medium
    title: "Rate limiting su /token, /register, /app/auth + IP negli eventi di fallimento"
    status: closed
    since: v0.32.0
    evidence:
      - file: services/gateway/app/ratelimit.py
        contains: ["class RateLimiter"]
      - file: services/gateway/app/oauth.py
        contains: ["_REGISTER_LIMIT.allow", "_TOKEN_LIMIT.allow"]
      - file: services/gateway/app/miniapp.py
        contains: ['"event": "miniapp_auth_fail", "ip": ip', "def _client_ip"]

  - id: H12
    severity: medium
    title: "Sudoers dell'operator: da NOPASSWD:ALL a whitelist di comandi"
    status: partial
    since: v0.32.0
    evidence:
      - file: deploy.sh
        contains: ["ALL=(root) NOPASSWD:", "visudo -cf"]
        not_contains: ["NOPASSWD: ALL\n"]
      - file: installer/engine.py
        contains: ["ALL=(root) NOPASSWD:"]
    missing: >
      Sudo ristretto a install/systemctl/chown (censiti alla fonte da ogni sudo() della
      CLI; validato con visudo -cf prima di installare). MA l'operator RESTA
      root-equivalente via il gruppo `docker` (può `docker run -v /:/host`): la whitelist
      riduce la superficie sudo, non de-privilegia. Toglierlo dal gruppo docker
      romperebbe l'update (la CLI usa docker) → è un residuo dichiarato, non un fix
      mancato per distrazione.

  - id: H13
    severity: medium
    title: "Container di backup: via il docker.sock"
    status: closed
    since: v0.32.0
    evidence:
      - file: compose.ops.backup.yaml
        not_contains: ["/var/run/docker.sock"]
      - file: tools/backup.sh
        contains: ["BACKUP_VOLUMES_DIR"]
      - file: tools/backup-container-setup.sh
        contains: ["apk add --no-cache age=1.2.1-r0 bash=5.2.26-r0"]
    note: >
      Versioni apk pinnate (verificate sugli indici Alpine 3.20 x86_64+aarch64).
      Rimossi py3-pip/py3-bcrypt/tini, dipendenze del gateway finite qui per
      copia-incolla e mai usate dal backup. Un rebuild upstream farà fallire l'apk
      con messaggio chiaro, non con un pacchetto diverso in silenzio.

  - id: H14
    severity: medium
    title: "Snapshot pre-update: escludere nlm-auth (cookie Google in chiaro)"
    status: closed
    since: v0.32.0
    why: >
      ERODEVA H6: lo snapshot pre-update NON cifrato includeva nlm-auth → i cookie
      Google finivano in chiaro in backups/pre-update/.
    evidence:
      - file: tools/vps1777.py
        contains: ["SNAPSHOT_EXCLUDED_VOLUMES", "snapshot_purge_excluded", "for vol in SNAPSHOT_VOLUMES:"]
    note: >
      Scelta (a) esclusione, verificata leggendo il rollback: NON legge mai nlm-auth
      (fa restore dati + health-gate, che non prova l'auth Google) → non lo rompe.
      L'auth nlm non è un dato, è una sessione che si ricarica da /admin/nlm; e il
      backup age la include comunque, cifrata. In più: purge dei nlm-auth.tar GIÀ
      scritti in chiaro da CLI precedenti — aggiornare il codice non basta a togliere
      il segreto dagli snapshot vecchi.

  - id: H15
    severity: medium
    title: "TS_AUTHKEY: wipe post-tailscale-up, chmod 600 su .env, file orfano"
    status: closed
    since: v0.32.0
    evidence:
      - file: deploy.sh
        contains: ["ts_wipe_authkey", "chmod 600 .env", "rm -f secrets/ts_authkey.txt"]
      - file: installer/engine.py
        contains: ["_wipe_ts_authkey"]
    note: >
      Wipe della authkey (monouso) da .env dopo un tailscale up riuscito; .env a 600;
      file orfano rimosso (verificato: nessun compose lo consumava). Bonus: engine usa
      --authkey=file: invece di argv (H7).

  - id: H16
    severity: medium
    title: "Password admin: nasce sul PC, viaggia solo come hash, policy unica"
    status: partial
    since: v0.32.0
    evidence:
      - file: deploy.sh
        contains: ["pw_weak_reason"]
        not_contains: ["GENERATED_ADMIN_PWD"]
      - file: setup.sh
        contains: ["pw_weak_reason"]
      - file: tools/rotate-secret.sh
        contains: ["pw_weak_reason"]
    missing: >
      Fatto: la password NASCE sul PC (non più sulla VPS con ritorno sullo stdout SSH);
      policy unica pw_weak_reason (min 16 + 3 classi) ai tre ingressi. RESIDUO onesto:
      se il PC non ha bcrypt, il chiaro attraversa SSH IN AVANTI (stdin cifrato, mai
      argv, mai di ritorno) invece dell'hash — non è "solo hash" al 100%. Non imposta
      una dipendenza bcrypt obbligatoria sul PC per non rompere i deploy dove manca.

  - id: H17
    severity: medium
    title: "Audit: rotazione, retention, lettura tail-like, niente email digitata"
    status: closed
    since: v0.32.0
    evidence:
      - file: services/gateway/app/audit.py
        contains: ["def _tail_lines", "def audit_health", "_write_failures"]
      - file: services/gateway/app/admin.py
        contains: ["audit_health()", "audit degradato"]
    note: >
      Lettura dalla coda a blocchi (non più readlines di tutto il file); contatore
      dei fallimenti di scrittura ESPOSTO e mostrato nel pannello audit (un elenco
      "vuoto" per errore di scrittura non è più una bugia per omissione).

  - id: H18
    severity: medium
    title: "Percorso di cancellazione per l'archivio + sezione «dati a riposo»"
    status: closed
    since: v0.33.0
    evidence:
      - file: services/gateway/app/admin.py
        contains: ["admin_archive_delete"]
      - file: SECURITY.md
        contains: ["Dati a riposo"]
    note: >
      Cancellazione per-DB + sezione «Dati a riposo» in SECURITY.md (volume archive e
      disco VPS non cifrati a riposo — dichiarato). DECISIONE Neo: per-conversazione e
      cifratura volume NON fatte (complessità non giustificata).

  - id: H19
    severity: medium
    title: "Inventario dei flussi verso terzi + flag per i comandi RAG del bot"
    status: closed
    since: v0.24.0
    evidence:
      - file: SECURITY.md
        contains: ["Flussi di dati verso terzi", "BOT_RAG_COMMANDS"]
      - file: services/nb1777-bot/app/settings.py
        contains: ["bot_rag_commands"]
      - file: services/nb1777-bot/app/bot.py
        contains: ["_rag_disabled"]

  - id: H20
    severity: medium
    title: "Revoca reale della sessione admin (jti + revoke-list) e logout dietro CSRF"
    status: closed
    since: v0.32.0
    why: >
      Il logout cancellava solo il cookie; il token admin non aveva jti né revoke-list
      → un token rubato restava valido 8h anche dopo il logout. Bonus trovato: i due
      form di logout erano ANNIDATI nei form di upload → il logout era già rotto.
    evidence:
      - file: services/gateway/app/jwt_helpers.py
        contains: ['"jti"']
      - file: services/gateway/app/admin_core.py
        contains: ["class RevocationList", "def revoke", "def is_revoked"]
      - file: services/gateway/app/admin.py
        contains: ["admin_revoked.json", "_revocations().revoke", "admin_logout"]
        not_contains: ["async def logout(_request: Request)"]
      - file: services/gateway/tests/test_admin_core.py
        contains: ["RevocationList"]

  - id: H21
    severity: medium
    title: "Riconciliazione doc↔codice + email di contatto + gate di release"
    status: closed
    since: v0.33.0
    evidence:
      - file: SECURITY.md
        contains: ["antigravity1777@gmail.com"]
      - file: security/check_findings.py
        contains: ["SECURITY.md dichiara", "non combacia"]
      - file: .github/workflows/ci.yml
        contains: ["security/check_findings.py"]
    note: >
      Gli scostamenti sono chiusi perché il codice ha RAGGIUNTO la doc: la consent page
      (H8) e la separazione egress (H25) ORA esistono, e SECRETS.md mode-700 è vera (H38).
      Il GATE di release è `security/findings.yml` + `check_findings.py` in CI: verifica
      che ogni claim chiuso abbia la sua coordinata e che i conteggi in SECURITY.md
      combacino col registro. Lo scostamento doc↔codice ora fa fallire la build.

  - id: H22
    severity: medium
    title: "Compose pinnato ai digest, non solo ai tag"
    status: partial
    since: v0.27.0
    evidence:
      - file: compose.ops.backup.yaml
        contains: ["@sha256:"]
      - file: compose.ingress.caddy.yaml
        contains: ["@sha256:"]
    missing: >
      Le 4 immagini vps1777 restano a tag mobile in compose.yaml; il pinning ai digest
      vive solo POST-pull dentro la CLI (verify_digests contro images.lock). Un
      `docker compose pull` lanciato fuori dalla CLI ri-risolve il tag senza controlli.

  - id: H23
    severity: medium
    title: "Action GitHub pinnate a SHA (+ Dependabot)"
    status: closed
    since: v0.27.0
    evidence:
      - file: .github/dependabot.yml
        contains: ["github-actions", "docker-compose"]
      - file: .github/workflows/trivy.yml
        not_contains: ["trivy-action@master"]
      # Evidenza robusta ai bump legittimi: checkout c'è ed è pinnata a SHA
      # (NON a un tag mobile `@v...` o `@main`), che è ciò che H23 afferma. Il
      # SHA specifico lo aggiorna Dependabot/il bump manuale; l'evidenza no.
      - file: .github/workflows/release.yml
        contains: ["actions/checkout@"]
        not_contains: ["actions/checkout@v", "actions/checkout@main"]

  - id: H24
    severity: medium
    title: "Protezione dei tag v* e permessi per-job nei workflow"
    status: partial
    since: v0.27.0
    why: >
      Le release sono firmate cosign KEYLESS DAL WORKFLOW. Senza protezione sui tag,
      chiunque possa pushare un tag `v*` conia una release REGOLARMENTE FIRMATA.
      La firma prova da quale workflow viene un artefatto, non che qualcuno abbia
      autorizzato quel rilascio. Erode il valore di H2.
    evidence:
      - file: .github/workflows/release.yml
        contains: ["permissions:", "id-token: write"]
    evidence_external:
      - kind: github-ruleset
        file: security/rulesets/tag-v-immutabili.json
        verify: "gh api repos/neo1777/vps1777/rulesets --jq '.[]|.name+\": \"+.enforcement'"
        note: >
          È un'impostazione GitHub, NON un file: il checker non può verificarla.
          Dichiararlo è meglio che fingere che sia verificata come le altre.
    missing: >
      I tag v* pubblicati sono ora IMMUTABILI (ruleset `tag-v-immutabili`: deletion +
      update; provato sul campo che spostare o cancellare un tag è rifiutato, e che
      crearne uno nuovo resta possibile — il rilascio funziona). LEZIONE: la regola
      `non_fast_forward` NON bastava, perché spostare un tag IN AVANTI è un
      fast-forward e passava.
      RESTA APERTO: chi ha accesso in push può ancora coniare un tag NUOVO e quindi
      una release nuova regolarmente firmata. Per chiudere anche quello serve un
      environment `release` con reviewer.

  - id: H25
    severity: medium
    title: "Rete egress separata; su ingress solo gateway + sidecar; doc plugin oneste"
    status: closed
    since: v0.33.0
    why: >
      nb1777-mcp e il bot stavano su `ingress` per uscire su Internet — la stessa rete
      del proxy internet-facing. Un proxy compromesso si trovava accanto a loro.
    evidence:
      - file: compose.yaml
        contains: ["egress:", "- egress"]
      - file: docs/PLUGINS.md
        contains: ["fiducia piena"]
    note: >
      Rete `egress` (bridge senza porte pubblicate: solo uscita); nb1777-mcp+bot spostati
      lì, tolti da `ingress`. Su ingress restano solo gateway+proxy. VERIFICATO sul VPS:
      da egress NotebookLM+Telegram=302, da rete internal=000 (uscita bloccata).
      ARCHITECTURE.md allineato + nota "fiducia piena" in PLUGINS.md.

  - id: H26
    severity: medium
    title: "Mascherare il gateway_secret nella Mini App (reveal esplicito)"
    status: closed
    since: v0.32.0
    evidence:
      - file: services/gateway/app/miniapp_core.py
        contains: ["def masked_connector_url", "SECRET_MASK"]
      - file: services/gateway/app/miniapp.py
        contains: ["url_masked", "miniapp_secret_revealed"]
    note: >
      Il segreto vero non entra nel DOM (nemmeno in un data-*) finché l'utente non tocca
      "Mostra"; ri-mascheramento dopo 30s; avviso clipboard una-tantum.

  - id: H27
    severity: medium
    title: "Finestra initData ridotta (6-12h) e owner re-check sul Bearer"
    status: closed
    since: v0.32.0
    evidence:
      - file: services/gateway/app/miniapp_core.py
        contains: ["INIT_DATA_MAX_AGE_S = 12 * 3600"]
      - file: services/gateway/app/miniapp.py
        contains: ["miniapp_bearer_not_owner"]

  - id: H28
    severity: medium
    title: "Secondo fattore (TOTP o passkey) sul pannello admin"
    status: accepted
    missing: >
      DECISIONE Neo (14 lug): NIENTE 2FA. Gateway mono-utente dietro Tailscale Funnel;
      difese = password bcrypt-12 + lockout per-IP + CSRF + revoca reale sessione (H20).
      Il 2FA aggiungerebbe attrito + un secret per guadagno marginale su questo profilo.
      Rischio accettato, non dimenticato.

  - id: H29
    severity: medium
    title: "Token bot Telegram riclassificato di fascia massima"
    status: closed
    since: v0.33.0
    evidence:
      - file: tools/vps1777.py
        contains: ["Token bot Telegram (radice Mini App)", "90, False"]
      - file: docs/SECRETS.md
        contains: ["radice di fiducia"]

  - id: H30
    severity: medium
    title: "Open redirect sul parametro next del login"
    status: closed
    since: v0.21.0
    why: >
      RI-VERIFICATO in v0.32.0 e trovato un BYPASS che era sfuggito: startswith(base)
      è un match di PREFISSO, non di ORIGINE — https://host.evil.com/ superava il gate.
      La logica è ora estratta in un modulo PURO e testata (12 attacchi), così non può
      tornare in silenzio.
    evidence:
      - file: services/gateway/app/admin_core.py
        contains: ["def safe_next_url"]
      - file: services/gateway/tests/test_admin_core.py
        contains: ["test_next_ostile_viene_scartato"]


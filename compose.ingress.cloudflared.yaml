# compose.ingress.cloudflared.yaml — Cloudflare Tunnel
#
# Outbound tunnel verso CF — nessuna porta aperta sul VPS, anti-DDoS gratis.
# Vincolo: serve account Cloudflare + tunnel pre-creato + token.
#
# Setup:
#   1. Crea il tunnel su https://one.dash.cloudflare.com → Networks → Tunnels
#   2. Configura hostname che punti a http://gateway:8080
#   3. Copia il token in secrets/cloudflared_token.txt
#
# Profilo: ingress.cloudflared

services:

  cloudflared:
    profiles: [ingress.cloudflared]
    image: cloudflare/cloudflared:2024.12.0
    container_name: vps1777-cloudflared
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN_FILE: /run/secrets/cloudflared_token
    secrets:
      - cloudflared_token
    networks:
      - ingress
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cloudflared tunnel info 2>&1 | grep -q healthy || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

  gateway:
    networks:
      - backend
      - ingress

secrets:
  cloudflared_token:
    file: ./secrets/cloudflared_token.txt

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Lint Python (ruff)
        run: |
          uv tool install ruff
          ruff check services/ tools/vps1777.py
      - name: ShellCheck bash
        run: |
          sudo apt-get install -y shellcheck
          shellcheck setup.sh tools/*.sh || true
      # Entrambe le combinazioni devono restare valide: produzione (solo
      # immagini ghcr) e sviluppo (overlay di build locale).
      - name: Validate compose (production — pull only)
        run: docker compose -f compose.yaml config -q
      - name: Validate compose (dev — build overlay)
        run: docker compose -f compose.yaml -f compose.build.yaml config -q
      # Le migrazioni pubblicate sono immutabili: un run.py/migration.json già
      # su main non può cambiare (il registro sulla VPS ne pinna il checksum).
      - name: Migrations immutability
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          # diff two-dot (confronto di TREE, niente merge-base: il checkout PR
          # è il merge commit, che contiene già main → nessun falso positivo).
          # --no-renames: senza, un `git mv` di una migrazione + edit passa come
          # status R (rename) e sfugge al filtro MD → immutabilità bypassata.
          CHANGED="$(git diff --no-renames --diff-filter=MD --name-only origin/main HEAD -- 'migrations/*/run.py' 'migrations/*/migration.json' || true)"
          if [ -n "$CHANGED" ]; then
            echo "::error::migrazioni esistenti modificate o rimosse: $CHANGED"
            exit 1
          fi

  # Contract-test wrapper ↔ CLI nlm: installa il pin reale (0.7.7) e verifica
  # che le firme dei sottocomandi `source` siano quelle su cui core.py si
  # appoggia. Un bump di nlm che cambia una firma fallisce QUI, non in prod.
  contract:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Sync nb1777-mcp (installa nlm pinnato + pytest)
        working-directory: services/nb1777-mcp
        run: uv sync
      - name: Contract-test source CLI
        working-directory: services/nb1777-mcp
        run: uv run pytest tests/ -v
      - name: Test archive indexer (gateway, stdlib-only)
        run: uvx pytest services/gateway/tests/ -v
      - name: Test archive-mcp FTS (stdlib-only)
        run: uvx pytest services/archive-mcp/tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [gateway, archive-mcp, nb1777-mcp, nb1777-bot]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/vps1777-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: la CI legge il repo e basta. Nessun job qui pubblica nulla.
# Le action sono pinnate al commit SHA (non al tag mobile): un tag ripuntato a
# monte non può iniettare codice: Dependabot (github-actions) bumpa gli SHA.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Lint Python (ruff)
        run: |
          uv tool install ruff
          ruff check services/ tools/vps1777.py
      - name: ShellCheck bash
        run: |
          sudo apt-get install -y shellcheck
          shellcheck setup.sh tools/*.sh || true
      # Il registro dei rilievi di sicurezza: ogni voce dichiarata `closed` deve
      # portare un'evidenza, e quell'evidenza deve ESISTERE ANCORA nel codice.
      # Nasce da un errore vero: SECURITY.md ha dichiarato «dossier applicato per
      # intero» quando 8 rilievi su 43 erano chiusi, e nessuno se n'è accorto
      # perché quella frase non puntava a nulla. Ora una dichiarazione falsa è
      # una build rossa.
      - name: Registro dei rilievi — nessun claim senza coordinata
        run: uv run --with pyyaml security/check_findings.py
      # Anti-leak: niente export di sessione tracciati, niente materiale
      # credenziale nei file del repo. Nasce da un errore vero: un transcript di
      # lavoro (.txt dal nome innocuo, ma con dentro tutto il detto-e-fatto della
      # sessione) è entrato in una PR ed è finito su un repo pubblico. Il
      # .gitignore da solo non bastava: non ferma `git add -f` e non fa nulla per
      # un file già tracciato. Questo gira a ogni PR e dice no PRIMA del merge —
      # perché dopo non si disfa: resta nella storia, nei diff e in ogni clone.
      - name: Gate anti-leak — online solo ciò che online si può
        run: python3 security/check_no_leaks.py
      # Entrambe le combinazioni devono restare valide: produzione (solo
      # immagini ghcr) e sviluppo (overlay di build locale).
      - name: Validate compose (production — pull only)
        run: docker compose -f compose.yaml config -q
      - name: Validate compose (dev — build overlay)
        run: docker compose -f compose.yaml -f compose.build.yaml config -q
      # Le migrazioni pubblicate sono immutabili: un run.py/migration.json già
      # su main non può cambiare (il registro sulla VPS ne pinna il checksum).
      - name: Migrations immutability
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          # diff two-dot (confronto di TREE, niente merge-base: il checkout PR
          # è il merge commit, che contiene già main → nessun falso positivo).
          # --no-renames: senza, un `git mv` di una migrazione + edit passa come
          # status R (rename) e sfugge al filtro MD → immutabilità bypassata.
          CHANGED="$(git diff --no-renames --diff-filter=MD --name-only origin/main HEAD -- 'migrations/*/run.py' 'migrations/*/migration.json' || true)"
          if [ -n "$CHANGED" ]; then
            echo "::error::migrazioni esistenti modificate o rimosse: $CHANGED"
            exit 1
          fi

  # Contract-test wrapper ↔ CLI nlm: installa il pin reale (0.7.7) e verifica
  # che le firme dei sottocomandi `source` siano quelle su cui core.py si
  # appoggia. Un bump di nlm che cambia una firma fallisce QUI, non in prod.
  contract:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - name: Sync nb1777-mcp (installa nlm pinnato + pytest)
        working-directory: services/nb1777-mcp
        run: uv sync
      - name: Contract-test source CLI
        working-directory: services/nb1777-mcp
        run: uv run pytest tests/ -v
      - name: Test archive indexer (gateway, stdlib-only)
        run: uvx pytest services/gateway/tests/ -v
      - name: Test archive-mcp FTS (stdlib-only)
        run: uvx pytest services/archive-mcp/tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [gateway, archive-mcp, nb1777-mcp, nb1777-bot]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./services/${{ matrix.service }}
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/vps1777-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

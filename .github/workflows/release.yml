name: Release

# Su tag v* (da qualunque branch):
#   guard   → VERSION file == tag (e CHANGELOG ha la sezione, per le stable)
#   release → build+push delle 4 immagini su ghcr, firmate cosign keyless
#   bundle  → runtime bundle (file non-immagine + images.lock) allegato a una
#             GitHub Release; la Release è endpoint di check (/releases/latest),
#             sorgente changelog e host del bundle per `vps1777 update`.
#
# I tag prerelease (v1.2.3-rc.1) NON aggiornano :latest e la Release è marcata
# prerelease → invisibile a /releases/latest → gli utenti non vengono notificati.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # creazione della GitHub Release
  packages: write
  id-token: write   # cosign keyless

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
      prerelease: ${{ steps.ver.outputs.PRERELEASE }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-*) echo "PRERELEASE=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "PRERELEASE=false" >> "$GITHUB_OUTPUT" ;;
          esac
      # VERSION nel repo deve combaciare col tag: sincronia per costruzione,
      # non per convenzione. Per le prerelease basta la base (v0.9.0-rc.1 ok
      # sia con VERSION=0.9.0-rc.1 sia con VERSION=0.9.0).
      - name: Guard — VERSION file matches tag
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BASE_VERSION="${TAG_VERSION%%-*}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ] && [ "$FILE_VERSION" != "$BASE_VERSION" ]; then
            echo "::error::VERSION ($FILE_VERSION) non combacia col tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Guard — CHANGELOG has the release section (stable only)
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          case "$TAG_VERSION" in
            *-*) echo "prerelease: guard CHANGELOG saltata"; exit 0 ;;
          esac
          grep -q "^## \[$TAG_VERSION\]" CHANGELOG.md || {
            echo "::error::CHANGELOG.md senza sezione '## [$TAG_VERSION]'"
            exit 1
          }

  release:
    runs-on: ubuntu-latest
    needs: guard
    strategy:
      matrix:
        service: [gateway, archive-mcp, nb1777-mcp, nb1777-bot]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # :latest segue SOLO le release stable — mai le prerelease.
      - name: Compute tags
        id: tags
        run: |
          BASE="ghcr.io/${{ github.repository_owner }}/vps1777-${{ matrix.service }}"
          {
            echo "TAGS<<EOF"
            echo "$BASE:${{ needs.guard.outputs.version }}"
            if [ "${{ needs.guard.outputs.prerelease }}" = "false" ]; then
              echo "$BASE:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
          build-args: |
            VPS1777_VERSION=${{ needs.guard.outputs.version }}
          provenance: true
          sbom: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/vps1777-${{ matrix.service }}:${{ needs.guard.outputs.version }}

  bundle:
    runs-on: ubuntu-latest
    needs: [guard, release]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # images.lock: digest immutabili delle 4 immagini appena pushate.
      # È il gate supply-chain di `vps1777 update`: dopo il pull, i RepoDigests
      # locali DEVONO combaciare con questo lock.
      - name: Resolve image digests → images.lock
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          lock='{}'
          for svc in gateway archive-mcp nb1777-mcp nb1777-bot; do
            ref="ghcr.io/${OWNER}/vps1777-${svc}:${VERSION}"
            digest="$(docker buildx imagetools inspect "$ref" --format '{{json .Manifest}}' | jq -r '.digest')"
            [ -n "$digest" ] && [ "$digest" != "null" ] || { echo "::error::digest non risolto per $ref"; exit 1; }
            lock="$(echo "$lock" | jq --arg s "$svc" --arg r "ghcr.io/${OWNER}/vps1777-${svc}@${digest}" '. + {($s): $r}')"
          done
          echo "$lock" | jq . > images.lock
          cat images.lock
      # Il runtime bundle: SOLO i path gestiti (niente sorgenti/installer/doc
      # di sviluppo). bundle-manifest.json permette all'updater di cancellare
      # i file gestiti rimossi a monte (risolve la staleness del tar).
      - name: Assemble runtime bundle
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          mkdir -p bundle/tools
          cp compose*.yaml VERSION CHANGELOG.md images.lock bundle/
          cp -r ingress migrations systemd bundle/
          for f in backup.sh restore.sh rotate-secret.sh backup-container-setup.sh bootstrap.sh vps1777.py; do
            cp "tools/$f" bundle/tools/
          done
          python3 - <<'PY'
          import hashlib, json, os
          root = "bundle"
          files = {}
          for dirpath, _, names in os.walk(root):
              for n in sorted(names):
                  p = os.path.join(dirpath, n)
                  rel = os.path.relpath(p, root)
                  with open(p, "rb") as fh:
                      files[rel] = hashlib.sha256(fh.read()).hexdigest()
          out = {"version": os.environ["VERSION"], "files": files}
          with open(os.path.join(root, "bundle-manifest.json"), "w") as fh:
              json.dump(out, fh, indent=2, sort_keys=True)
          PY
          tar czf "vps1777-runtime-v${VERSION}.tar.gz" -C bundle .
          sha256sum "vps1777-runtime-v${VERSION}.tar.gz" > SHA256SUMS
          cat SHA256SUMS
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign SHA256SUMS (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS
      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          PRERELEASE: ${{ needs.guard.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            printf 'Prerelease di test `v%s` — non destinata agli utenti.\n' "$VERSION" > release-notes.md
          else
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" {found=1; next}
              found && /^## \[/ {exit}
              found {print}
            ' CHANGELOG.md > release-notes.md
            [ -s release-notes.md ] || printf 'Release v%s (vedi CHANGELOG.md).\n' "$VERSION" > release-notes.md
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.guard.outputs.prerelease == 'true' }}
          body_path: release-notes.md
          files: |
            vps1777-runtime-v${{ needs.guard.outputs.version }}.tar.gz
            SHA256SUMS
            SHA256SUMS.sig
            SHA256SUMS.pem

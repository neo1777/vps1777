# Dependabot — tiene fresche le dipendenze pinnate senza rinunciare al pin.
#
# Perché conta: le GitHub Action sono pinnate al commit SHA (non al tag mobile)
# e le immagini di terzi nei compose al digest sha256. Il pin blinda la
# supply-chain — un tag ripuntato a monte non entra — ma senza manutenzione
# invecchia (niente patch di sicurezza). Dependabot chiude il cerchio: apre PR
# che bumpano SHA/digest e riscrivono il commento della versione, una alla
# settimana, raggruppate per non frammentare.

version: 2
updates:
  # ── GitHub Actions: mantiene freschi gli SHA pinnati nei 3 workflow ────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]
    # I salti di MAJOR portano breaking change che rompono la CI: la PR #35
    # bumpò 9 action ai major (setup-uv v3→v8 in un colpo) e la lint fallì. Qui
    # il valore di Dependabot è tenere fresche le SHA DENTRO il major corrente
    # (finding H23); i major si fanno a mano, quando c'è tempo di riparare la
    # rottura. Minor e patch entrano come prima.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Immagini base dei Dockerfile (python:3.12-slim), un servizio a directory ─
  - package-ecosystem: docker
    directories:
      - /services/gateway
      - /services/archive-mcp
      - /services/nb1777-mcp
      - /services/nb1777-bot
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      base-images:
        patterns: ["*"]
    # python:3.12-slim → 3.14 è un salto MINOR in semver-docker (major=3 resta).
    # Un cambio di runtime Python sull'immagine con Chromium/Playwright (nb1777-mcp)
    # NON è validato dal solo `docker build` della CI: la PR #34 passava il build
    # ma nessuno prova Chromium headless + il flusso nlm a runtime. Restiamo sulla
    # linea 3.12, bump manuale quando la cadenza di release si assesta. `uv` e le
    # patch di python restano liberi.
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  # ── Immagini di terzi nei compose (alpine, caddy, cloudflared, portainer,
  #    watchtower): bumpa il digest pinnato quando il tag avanza. Le 4 immagini
  #    vps1777 usano un tag-variabile ${VPS1777_TAG} → Dependabot le salta da sé,
  #    e comunque `vps1777 update` le verifica contro images.lock. ────────────
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      compose-images:
        patterns: ["*"]
    ignore:
      # Immagini nostre: versionate dal release-flow, non da Dependabot.
      - dependency-name: "ghcr.io/neo1777/vps1777-*"
